name: devx Security Scanners

# Cost-optimized: weekly-only mode
# Per-PR scanning removed to stay under $12/month budget
# Local enforcement: pre-push hook (install via --install-hook flag)
# Continuous CVE monitoring: Renovate (opens fix PRs on new CVE disclosure)
#
# Cost model:
#   Weekly runs: ~3,446 min/month
#   Free included: 3,000 min (Team plan)
#   Billable: ~446 min @ $0.008 = ~$3.57/month
#   Budget ceiling: $12/month

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday 00:00 UTC
  workflow_dispatch: # Manual trigger for ad-hoc scans

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for TruffleHog git history scan

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Install Trivy v0.69.3 (pinned + checksum verified)
        run: |
          TRIVY_VERSION="0.69.3"
          ARCHIVE="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          EXPECTED="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${ARCHIVE}"
          echo "${EXPECTED}  ${ARCHIVE}" | sha256sum -c
          tar -xzf "${ARCHIVE}" trivy
          sudo mv trivy /usr/local/bin/trivy

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install Semgrep
        run: pip install semgrep

      - name: Create output directory
        run: mkdir -p security-audit

      - name: Run Trivy (dependency CVE scan)
        run: |
          trivy fs . \
            --format sarif \
            --output security-audit/trivy.sarif \
            --cache-dir /tmp/trivy-cache \
            --exit-code 0
        continue-on-error: true

      - name: Run TruffleHog (secrets - full git history)
        run: |
          trufflehog git file://. --json --no-update 2>/dev/null \
            > security-audit/trufflehog.json || true

      - name: Convert TruffleHog JSON to SARIF
        run: |
          python3 << 'EOF'
          import json, glob

          findings = []
          try:
              with open("security-audit/trufflehog.json") as f:
                  for line in f:
                      line = line.strip()
                      if line:
                          try:
                              findings.append(json.loads(line))
                          except json.JSONDecodeError:
                              pass
          except FileNotFoundError:
              pass

          rules = []
          results = []
          seen_rules = set()

          for finding in findings:
              detector = finding.get("DetectorName", "unknown")
              if detector not in seen_rules:
                  seen_rules.add(detector)
                  rules.append({
                      "id": detector,
                      "name": detector,
                      "shortDescription": {"text": f"Hardcoded {detector} credential detected"},
                      "defaultConfiguration": {"level": "error"},
                      "properties": {"tags": ["security", "secrets"], "severity": "CRITICAL"}
                  })

              meta = finding.get("SourceMetadata", {}).get("Data", {})
              git_meta = meta.get("Git", {})
              file_path = git_meta.get("file", "unknown")
              line_num = git_meta.get("line", 1)
              verified = finding.get("Verified", False)

              results.append({
                  "ruleId": detector,
                  "level": "error",
                  "message": {
                      "text": f"{'Verified' if verified else 'Potential'} {detector} credential found in git history"
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": file_path, "uriBaseId": "%SRCROOT%"},
                          "region": {"startLine": max(1, int(line_num))}
                      }
                  }],
                  "properties": {"severity": "CRITICAL" if verified else "HIGH"}
              })

          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "TruffleHog",
                          "version": "3.x",
                          "informationUri": "https://github.com/trufflesecurity/trufflehog",
                          "rules": rules
                      }
                  },
                  "results": results
              }]
          }

          with open("security-audit/trufflehog.sarif", "w") as f:
              json.dump(sarif, f, indent=2)

          print(f"Converted {len(results)} TruffleHog findings to SARIF")
          EOF

      - name: Run Semgrep (SAST scan)
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output security-audit/semgrep.sarif \
            . 2>/dev/null || true
        continue-on-error: true

      - name: Debug - list SARIF files
        if: always()
        run: |
          echo "=== SARIF files in security-audit/ ==="
          ls -la security-audit/ 2>/dev/null || echo "Directory does not exist"
          for f in security-audit/*.sarif; do
            [ -f "$f" ] && echo "  $f: $(wc -c < "$f") bytes" || true
          done

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-audit/
        continue-on-error: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-${{ github.run_id }}
          path: security-audit/
          retention-days: 90

      - name: Fail if high or critical findings detected
        if: always()
        run: |
          python3 << 'EOF'
          import json, glob, sys

          found = False
          for path in glob.glob("security-audit/*.sarif"):
              try:
                  data = json.load(open(path))
              except Exception:
                  continue
              for run in data.get("runs", []):
                  for result in run.get("results", []):
                      if result.get("level") == "error":
                          found = True
                          break

          if found:
              print("HIGH or CRITICAL findings detected. Review the Security tab and scan artifacts.")
              sys.exit(1)
          else:
              print("No HIGH or CRITICAL findings.")
          EOF
