name: devx Security Scanners

# Cost-optimized: weekly-only mode
# Per-PR scanning removed to stay under $12/month budget
# Local enforcement: pre-push hook (install via --install-hook flag)
# Continuous CVE monitoring: Renovate (opens fix PRs on new CVE disclosure)
#
# Cost model:
#   Weekly runs: ~3,446 min/month
#   Free included: 3,000 min (Team plan)
#   Billable: ~446 min @ $0.008 = ~$3.57/month
#   Budget ceiling: $12/month

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday 00:00 UTC
  workflow_dispatch: # Manual trigger for ad-hoc scans

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for TruffleHog git history scan

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install pyyaml semgrep

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install Trivy v0.69.3 (pinned + checksum verified)
        run: |
          TRIVY_VERSION="0.69.3"
          ARCHIVE="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          EXPECTED="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${ARCHIVE}"
          echo "${EXPECTED}  ${ARCHIVE}" | sha256sum -c
          tar -xzf "${ARCHIVE}" trivy
          sudo mv trivy /usr/local/bin/trivy

      - name: Fetch run_audit.py from awesome-devx-llm
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/devx-commerce/awesome-devx-llm/main/plugins/profiler/skills/security-audit/run_audit.py" \
            -o run_audit.py

      - name: Run full history scan
        id: scan
        run: |
          python3 run_audit.py . \
            --scan-history \
            --fail-on high \
            --sarif \
            --trivy-cache-dir /tmp/trivy-cache 2>&1 | tee scan-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-audit/
        continue-on-error: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-${{ github.run_id }}
          path: |
            security-audit/README.md
            security-audit/runs/
            scan-output.txt
          retention-days: 90

      - name: Fail if high/critical found
        if: always()
        run: |
          if grep -q "CRITICAL\|HIGH" security-audit/README.md 2>/dev/null; then
            echo "High or critical findings detected. Review the Security tab and scan artifacts."
            exit 1
          fi
